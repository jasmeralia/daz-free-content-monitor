services:
  daz-monitor:
    # Pre-built image from GHCR — replace with a specific tag for production use
    # e.g. ghcr.io/jasmeralia/daz-free-content-monitor:0.1.0
    image: ghcr.io/jasmeralia/daz-free-content-monitor:latest

    # Uncomment to build locally instead of pulling from GHCR:
    # build: .

    volumes:
      - /mnt/myzmirror/daz_data:/app/data

    environment:
      PYTHONUNBUFFERED: "1"
      DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/REPLACE_ME"
      CHECK_INTERVAL_SECONDS: "3600"
      DB_PATH: "/app/data/daz_monitor.db"
      LOG_FILE: "/app/data/daz_monitor.log"
      LOG_LEVEL: "INFO"
      DISPLAY_TIMEZONE: "America/Los_Angeles"
      # PAGE_DELAY_MIN: "2.0"
      # PAGE_DELAY_MAX: "5.0"
      # PAGE_TIMEOUT_MS: "30000"
      # MAX_RETRIES: "3"
      # DRY_RUN: "0"

    restart: unless-stopped
